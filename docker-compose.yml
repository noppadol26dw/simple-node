services:
  # Reverse proxy + load balancer. Only this service is published; the API
  # sits on the internal network. Scale with: --scale api=3
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '8080:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  api:
    build: .
    # No host port: traffic enters through nginx, and leaving it unpublished
    # is what lets `--scale api=N` run multiple replicas.
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: books
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: books
    volumes:
      - db_data:/var/lib/postgresql/data
      # Seed schema + sample rows on first startup.
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d books']
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Observability (opt-in) -------------------------------------------
  # Start with: docker compose --profile observability up
  prometheus:
    image: prom/prometheus:latest # pin a version for real projects
    profiles: [observability]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'

  # Exposes Postgres metrics to Prometheus.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest # pin in real projects
    profiles: [observability]
    environment:
      DATA_SOURCE_NAME: 'postgresql://postgres:postgres@db:5432/books?sslmode=disable'
    depends_on:
      db:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest # pin a version for real projects
    profiles: [observability]
    ports:
      - '3001:3000'
    environment:
      # Anonymous admin, demo only.
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
    # No data volume: datasource + dashboards are provisioned from files, so a
    # pinned datasource uid can't clash with stale persisted state.
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  db_data:
