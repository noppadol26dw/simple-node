events {}

http {
  # Docker's embedded DNS (always 127.0.0.11). Re-resolving 'api' on a timer
  # means newly scaled replicas join the rotation without an nginx reload.
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;

    location / {
      # Variable in proxy_pass forces per-request DNS lookup → round-robins
      # across all 'api' replicas. A literal proxy_pass would pin to one.
      set $backend api:3000;
      proxy_pass http://$backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
